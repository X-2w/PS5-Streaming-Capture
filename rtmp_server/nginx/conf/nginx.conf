worker_processes 1;
error_log logs/error.log info;

events {
    worker_connections 1024;
}

rtmp {
    access_log logs/rtmp_access.log;

    server {
        listen 1935;
        chunk_size 4096;

        application app {
            live on;
            record off;

            notify_method get;
            on_publish http://127.0.0.1:8081/publish;
            on_publish_done http://127.0.0.1:8081/publish_done;
            on_play http://127.0.0.1:8081/play;
            on_play_done http://127.0.0.1:8081/play_done;

            allow publish 127.0.0.1;
            allow publish 192.168.0.0/16;
            allow publish 10.0.0.0/8;
            allow publish 172.16.0.0/12;
            deny publish all;

            # PS5 推流序列：Connect → Publish → Play（回显验证）→ 数据流
            # Play 必须允许：PS5 通过 Play 验证推流成功，拒绝会导致 PS5 超时
            allow play 127.0.0.1;
            allow play 192.168.0.0/16;
            allow play 10.0.0.0/8;
            allow play 172.16.0.0/12;
            deny play all;
        }
    }
}

http {
    server {
        listen 8080;
        server_name localhost;

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root html;
        }

        location / {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
    }
}
